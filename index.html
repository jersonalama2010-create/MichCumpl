<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una sorpresa para ti 💝</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffd3a5);
            overflow: hidden;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Estrellas de fondo */
        .star {
            position: absolute;
            color: white;
            font-size: 14px;
            opacity: 0.8;
            animation: brillar 2s infinite alternate;
            z-index: 0;
        }

        @keyframes brillar { from { opacity: 0.2; } to { opacity: 1; } }

        /* Botón */
        #boton {
            padding: 20px 50px;
            font-size: 28px;
            border: none;
            border-radius: 60px;
            background: #ff2e63;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 10;
        }

        #boton:hover { transform: scale(1.1); }

        /* Contenedor de la Carta */
        #carta {
            display: none;
            max-width: 600px;
            font-size: 24px;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 5;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Mensaje Final (Gigante) */
        #mensajeFinal {
            display: none;
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 15px #fff, 0 0 30px #ff4d6d, 0 0 50px #ff4d6d;
            z-index: 10;
            animation: popIn 1s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Elementos animados */
        .heart, .flower, .confetti, .firework { position: absolute; pointer-events: none; }
        .heart { bottom: -50px; font-size: 30px; animation: subir 6s linear infinite; }
        .flower { top: -50px; font-size: 35px; animation: caer 7s linear infinite; }
        .confetti { width: 12px; height: 12px; top: -10px; animation: confeti 5s linear infinite; }
        .firework { font-size: 60px; animation: boom 1s ease-out forwards; }

        @keyframes subir { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }
        @keyframes caer { to { transform: translateY(110vh) rotate(360deg); } }
        @keyframes confeti { to { transform: translateY(110vh) rotate(720deg); } }
        @keyframes boom { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

    <button id="boton" onclick="iniciarSorpresa()">🎁 Toca aquí para tu sorpresa 💖</button>

    <div id="carta"></div>

    <div id="mensajeFinal"></div>

    <audio id="musica" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Estrellas de fondo inmediatas
        for(let i=0; i<60; i++){
            const star = document.createElement("div");
            star.classList.add("star");
            star.innerHTML = "✦";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.animationDelay = Math.random() * 2 + "s";
            document.body.appendChild(star);
        }

        const textoCarta = "Hoy no solo celebramos tu cumpleaños, celebramos lo especial que eres. Gracias por existir, por tu luz y por hacer que cada día sea más bonito. Espero que este nuevo año esté lleno de sueños cumplidos y muchas razones para sonreír...";
        const textoFinal = "🎉 ¡FELIZ CUMPLEAÑOS!<br>PRECIOSA DE MI CORAZÓN 💖";

        function iniciarSorpresa() {
            document.getElementById("boton").style.display = "none";
            document.getElementById("musica").play();
            
            // 1. Mostrar la carta primero
            const cartaDiv = document.getElementById("carta");
            cartaDiv.style.display = "block";
            
            let i = 0;
            function escribirCarta() {
                if (i < textoCarta.length) {
                    cartaDiv.innerHTML += textoCarta[i];
                    i++;
                    setTimeout(escribirCarta, 50);
                } else {
                    // 2. Después de terminar la carta, esperar un poco y hacer la transición
                    setTimeout(transicionFinal, 2000);
                }
            }
            escribirCarta();
        }

        function transicionFinal() {
            // Desvanecer carta
            const cartaDiv = document.getElementById("carta");
            cartaDiv.style.transition = "opacity 1s";
            cartaDiv.style.opacity = "0";

            setTimeout(() => {
                cartaDiv.style.display = "none";
                
                // Mostrar mensaje final gigante
                const final = document.getElementById("mensajeFinal");
                final.style.display = "block";
                final.innerHTML = textoFinal;

                // Iniciar lluvia de efectos masiva
                setInterval(crearCorazon, 300);
                setInterval(crearFlor, 500);
                setInterval(crearConfeti, 150);
                setInterval(crearFuego, 800);
            }, 1000);
        }

        function crearCorazon() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        function crearFlor() {
            const flower = document.createElement("div");
            flower.classList.add("flower");
            flower.innerHTML = "🌹";
            flower.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(flower);
            setTimeout(() => flower.remove(), 7000);
        }

        function crearConfeti() {
            const confetti = document.createElement("div");
            confetti.classList.add("confetti");
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 5000);
        }

        function crearFuego() {
            const fire = document.createElement("div");
            fire.classList.add("firework");
            fire.innerHTML = "🎆";
            fire.style.left = Math.random() * 100 + "vw";
            fire.style.top = Math.random() * 60 + "vh";
            document.body.appendChild(fire);
            setTimeout(() => fire.remove(), 1000);
        }
    </script>
</body>
</html>
